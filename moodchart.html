<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情緒記錄表</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 10mm 12mm;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      background: #fff;
      width: 186mm;
      height: 277mm;
      margin: 0 auto;
      padding: 0;
      overflow: hidden;
    }

    /* One flex column that exactly fills the A4 content area */
    .page {
      width: 186mm;
      height: 277mm;
      display: flex;
      flex-direction: column;
      gap: 1.5mm;
    }

    /* Each row is a flex child — flex value sets proportional height */
    .row {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0; /* required for flex shrink to work */
    }

    .row img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    /*
      Natural aspect ratios:
        Header  4:1  → relative height = 1/4  = 0.250
        Mood    5:2  → relative height = 2/5  = 0.400
        Anxiety 5:2  → relative height = 2/5  = 0.400
        Sleep   5:2  → relative height = 2/5  = 0.400
        Notes   4:3  → relative height = 3/4  = 0.750
        Footer  4:1  → relative height = 1/4  = 0.250

      Sum = 2.450  → scale to 277mm (minus 5 gaps × 1.5mm = 7.5mm → 269.5mm)
      Scale factor: 269.5 / (2.450 × 186) = 269.5 / 455.7 = 0.5914

      Final heights (mm):
        Header  0.250 × 186 × 0.5914 = 27.5  → flex 275
        Mood    0.400 × 186 × 0.5914 = 44.0  → flex 440
        Anxiety 0.400 × 186 × 0.5914 = 44.0  → flex 440
        Sleep   0.400 × 186 × 0.5914 = 44.0  → flex 440
        Notes   0.750 × 186 × 0.5914 = 82.5  → flex 825
        Footer  0.250 × 186 × 0.5914 = 27.5  → flex 275
    */
    .row-header  { flex: 275; }
    .row-mood    { flex: 440; }
    .row-anxiety { flex: 440; }
    .row-sleep   { flex: 440; }
    .row-notes   { flex: 825; }
    .row-footer  { flex: 275; }

    /* Print */
    @media print {
      body  { width: 186mm; height: 277mm; overflow: hidden; }
      .no-print { display: none; }
    }

    /* Screen print button */
    .print-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #c9bbea;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(100,80,140,0.25);
      z-index: 99;
    }
    .print-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="page">
    <div class="row row-header">
      <img src="chart_header.png" alt="情緒記錄表頁首" />
    </div>
    <div class="row row-mood">
      <img src="chart_mood.png" alt="情緒評分尺" />
    </div>
    <div class="row row-anxiety">
      <img src="chart_anxiety.png" alt="焦慮評分尺" />
    </div>
    <div class="row row-sleep">
      <img src="chart_sleep.png" alt="睡眠質素評分尺" />
    </div>
    <div class="row row-notes">
      <img src="chart_notes.png" alt="備注欄" />
    </div>
    <div class="row row-footer">
      <img src="chart_footer.png" alt="鼓勵語句" />
    </div>
  </div>

  <button class="print-btn no-print" onclick="window.print()">🖨️ 列印</button>

</body>
</html>
